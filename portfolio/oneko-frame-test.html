<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Oneko Frame Test</title>
  <style>
    body { background: #111; color:#fff; font-family: sans-serif; }
    .grid { display: grid; grid-template-columns: repeat(8, 48px); gap: 4px; }
    .cell { width: 32px; height: 32px; background-image: url('./public/oneko.gif'); background-repeat:no-repeat; border:1px solid #444; }
    .label { font-size: 10px; }
  </style>
</head>
<body>
  <h1>Oneko Frame Test</h1>
  <div class="grid" id="grid"></div>
  <script>
    const grid = document.getElementById('grid');
    const coords = [
      {label:'(0,0)',x:0,y:0},
      {label:'(-1,0)',x:-1,y:0},
      {label:'(-2,0)',x:-2,y:0},
      {label:'(-3,0)',x:-3,y:0},
      {label:'(-4,0)',x:-4,y:0},
      {label:'(-5,0)',x:-5,y:0},
      {label:'(-6,0)',x:-6,y:0},
      {label:'(-7,0)',x:-7,y:0},
      {label:'(0,-1)',x:0,y:-1},
      {label:'(-1,-1)',x:-1,y:-1},
      {label:'(-2,-1)',x:-2,y:-1},
      {label:'(-3,-1)',x:-3,y:-1},
      {label:'(-4,-1)',x:-4,y:-1},
      {label:'(-5,-1)',x:-5,y:-1},
      {label:'(-6,-1)',x:-6,y:-1},
      {label:'(-7,-1)',x:-7,y:-1}
    ];
    coords.forEach(({label,x,y}) => {
      const cell = document.createElement('div');
      cell.className='cell';
      cell.style.backgroundPosition = `${x*32}px ${y*32}px`;
      const labelEl = document.createElement('div');
      labelEl.className='label';
      labelEl.textContent=label;
      const wrapper = document.createElement('div');
      wrapper.style.display='grid';
      wrapper.style.justifyItems='center';
      wrapper.appendChild(cell);
      wrapper.appendChild(labelEl);
      grid.appendChild(wrapper);
    });
  </script>
</body>
</html>
