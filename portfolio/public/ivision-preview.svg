<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ivGlow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ivBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0e14"/>
      <stop offset="100%" stop-color="#111722"/>
    </linearGradient>
    <linearGradient id="ivOrb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#ivBg)"/>
  <rect width="600" height="400" fill="url(#ivGlow)"/>

  <!-- faint grid -->
  <g stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
  </g>

  <!-- orbit rings around a central assistant core -->
  <g fill="none" stroke="#22d3ee" stroke-opacity="0.5">
    <circle cx="300" cy="176" r="88" stroke-width="1"/>
    <circle cx="300" cy="176" r="60" stroke-width="1" stroke-opacity="0.7"/>
  </g>

  <!-- orbiting nodes -->
  <circle cx="388" cy="176" r="5" fill="#67e8f9"/>
  <circle cx="300" cy="88"  r="4" fill="#67e8f9" opacity="0.8"/>
  <circle cx="240" cy="230" r="3.5" fill="#67e8f9" opacity="0.7"/>

  <!-- assistant core -->
  <circle cx="300" cy="176" r="30" fill="url(#ivOrb)"/>
  <circle cx="300" cy="176" r="30" fill="none" stroke="#e0fbff" stroke-opacity="0.4" stroke-width="1"/>

  <!-- waveform, suggesting live conversation / response -->
  <g stroke="#67e8f9" stroke-width="2.5" stroke-linecap="round">
    <line x1="270" y1="176" x2="270" y2="176"/>
    <line x1="281" y1="166" x2="281" y2="186"/>
    <line x1="292" y1="156" x2="292" y2="196"/>
    <line x1="303" y1="164" x2="303" y2="188"/>
    <line x1="314" y1="170" x2="314" y2="182"/>
    <line x1="325" y1="176" x2="325" y2="176"/>
  </g>

  <!-- label -->
  <text x="40" y="352" font-family="'Geist Mono', 'SF Mono', monospace" font-size="20" font-weight="600" fill="#e6f9fc" letter-spacing="0.5">I.Vision</text>
  <text x="40" y="374" font-family="'Geist Mono', 'SF Mono', monospace" font-size="12" fill="#7dd3e8" opacity="0.75" letter-spacing="0.5">RAG-powered personal AI assistant</text>
</svg>
